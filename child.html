<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#15613a">
<meta name="robots" content="noindex, nofollow">
<title>صفحة المتابعة — متابعة حفظ القرآن</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  :root {
    --green:#15613a; --green-deep:#0f4a2c; --green-light:#e7f3ec; --green-tint:#f1f8f4;
    --gold:#b8881e; --gold-soft:#d4a82c; --gold-light:#fbf4e0;
    --text:#16201b; --text-muted:#5e6b63; --text-hint:#9aa6a0;
    --bg:#f4f6f3; --surface:#ffffff;
    --border:rgba(20,40,28,0.08); --border-strong:rgba(20,40,28,0.16);
    --radius:16px; --radius-sm:10px; --red:#c0392b;
    --shadow-sm:0 1px 2px rgba(20,40,28,0.04), 0 1px 3px rgba(20,40,28,0.06);
    --shadow-md:0 2px 8px rgba(20,40,28,0.06), 0 4px 16px rgba(20,40,28,0.05);
  }
  body { font-family:-apple-system,'Segoe UI',Tahoma,Arial,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:40px; -webkit-font-smoothing:antialiased; }
  .header { background:linear-gradient(135deg,var(--green-deep),var(--green)); color:white; padding:26px 20px 22px; text-align:center; position:relative; }
  .header::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold-soft),transparent); opacity:0.7; }
  .header-icon { font-size:28px; margin-bottom:8px; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.2)); }
  .header h1 { font-size:19px; font-weight:700; letter-spacing:-0.01em; }
  .header-sub { margin-top:8px; }
  .badge-star { display:inline-block; background:rgba(255,255,255,0.18); color:#fff; font-size:12px; font-weight:600; padding:4px 12px; border-radius:20px; }
  .wrap { padding:16px; max-width:480px; margin:0 auto; }
  .card { background:var(--surface); border-radius:var(--radius); border:1px solid var(--border); padding:18px; margin-bottom:13px; box-shadow:var(--shadow-sm); }
  .card-title { font-size:11px; font-weight:700; color:var(--green); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:14px; display:flex; align-items:center; gap:7px; }
  .card-title .dot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 0 3px var(--green-light); }
  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:13px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 14px; text-align:center; box-shadow:var(--shadow-sm); }
  .stat-num { font-size:26px; font-weight:800; color:var(--green); letter-spacing:-0.02em; }
  .stat-lbl { font-size:12px; color:var(--text-muted); margin-top:4px; font-weight:500; }
  .task-line { font-size:14px; margin-bottom:8px; display:flex; align-items:flex-start; gap:8px; }
  .task-line:last-child { margin-bottom:0; }
  .session-item { padding:13px 0; border-bottom:1px solid var(--border); }
  .session-item:last-child { border-bottom:none; padding-bottom:0; }
  .session-date { font-size:12px; color:var(--text-hint); font-weight:600; margin-bottom:5px; }
  .session-line { font-size:13.5px; color:var(--text-muted); margin-top:4px; line-height:1.6; }
  .stars { letter-spacing:1px; color:var(--gold-soft); }
  .empty-state { text-align:center; color:var(--text-hint); font-size:14px; padding:1.5rem 1rem; }
  .status-msg { text-align:center; padding:60px 20px; color:var(--text-muted); font-size:14.5px; line-height:1.8; }
  .status-msg .big { font-size:38px; margin-bottom:12px; }
  .hint { font-size:11.5px; color:var(--text-hint); text-align:center; margin-top:6px; line-height:1.7; }
  .badges-list { display:flex; flex-wrap:wrap; gap:8px; }
  .badge-pill { display:inline-flex; align-items:center; gap:5px; background:var(--gold-light); color:var(--gold); border:1px solid rgba(184,136,30,0.25); font-size:12.5px; font-weight:600; padding:7px 12px; border-radius:20px; }
  @media (prefers-color-scheme:dark) {
    :root { --text:#eef2ef; --text-muted:#9fb0a6; --text-hint:#6a7872; --bg:#10140f; --surface:#1a1f1b; --border:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.16); --green-light:#15301f; }
  }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="header">
  <div class="header-icon">📖</div>
  <h1 id="child-name">جاري التحميل...</h1>
  <div class="header-sub" id="child-badge"></div>
</div>

<div class="wrap">
  <div id="content" style="display:none">
    <select id="month-filter" onchange="onMonthFilterChange()" style="width:100%;padding:10px 12px;margin-bottom:12px;border:1.5px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:inherit;font-size:13.5px;display:none">
      <option value="all">📅 كل الفترة</option>
    </select>
    <div class="stat-grid" id="stat-grid"></div>

    <div class="card" id="badges-card" style="display:none">
      <div class="card-title"><div class="dot"></div> 🏅 الأوسمة</div>
      <div class="badges-list" id="badges-list"></div>
    </div>

    <div class="card" id="progress-chart-card" style="display:none">
      <div class="card-title"><div class="dot"></div> 📈 تقدّم الدرجات</div>
      <div style="display:flex;gap:14px;margin-bottom:10px;font-size:12px">
        <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:var(--green);display:inline-block"></span> اللوح</span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:var(--gold);display:inline-block"></span> الماضي</span>
      </div>
      <div id="progress-chart-svg"></div>
      <div id="progress-trend" style="text-align:center;font-size:12.5px;font-weight:700;margin-top:8px"></div>
    </div>

    <div class="card" id="task-card" style="display:none">
      <div class="card-title"><div class="dot"></div> 📝 المهمة الحالية</div>
      <div id="task-body"></div>
    </div>

    <div class="card">
      <div class="card-title"><div class="dot"></div> آخر الجلسات</div>
      <div id="sessions-list"></div>
    </div>

    <div class="hint" id="updated-hint"></div>
  </div>

  <div class="status-msg" id="status-msg">
    <div class="big">⏳</div>
    جاري تحميل بيانات الطالب...
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCLzsd-tyAPKoS6HQ-Kw6LEwaxPSibbKSg",
  authDomain: "quran-app-abe52.firebaseapp.com",
  databaseURL: "https://quran-app-abe52-default-rtdb.firebaseio.com",
  projectId: "quran-app-abe52",
  storageBucket: "quran-app-abe52.firebasestorage.app",
  messagingSenderId: "484959710944",
  appId: "1:484959710944:web:454059b1f2136c0d73aa85"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Escape any value before injecting it into innerHTML — session notes and
// tajweed ayah numbers are the only fields here that could ever originate
// from free-text admin input.
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function ayahRange(from, to) { return (from && to) ? ' (' + from + '–' + to + ')' : from ? ' (من ' + from + ')' : ''; }

function joinSuraNames(list) {
  const parts = list.map(m => esc(m.sura) + ayahRange(esc(m.from), esc(m.to)));
  if (!parts.length) return '';
  if (parts.length === 1) return parts[0];
  return parts.slice(0, -1).join('، ') + ' و' + parts[parts.length - 1];
}

function scoreToHalfStars(score) {
  const s = Math.min(100, Math.max(0, parseInt(score) || 0));
  return Math.round(s / 10) * 0.5;
}

function renderStarsHTML(score) {
  const half = scoreToHalfStars(score);
  const fillPct = (half / 5) * 100;
  return '<span class="stars" style="position:relative;display:inline-block;font-size:14px;line-height:1;vertical-align:middle;direction:ltr">' +
    '<span style="color:#dcdcdc">★★★★★</span>' +
    '<span style="position:absolute;top:0;left:0;width:' + fillPct + '%;overflow:hidden;white-space:nowrap;color:#e8a700">★★★★★</span>' +
    '</span>';
}

// رسم بياني خفيف بدون مكتبات خارجية — خطين (لوح/ماضي) بتدرّج لوني تحتهم.
// نفس تقليد الرسم الأسبوعي في التطبيق الرئيسي: الأقدم يمين، الأحدث شمال
// (SVG دايماً بيرسم من الشمال لليمين داخلياً بغض النظر عن اتجاه الصفحة،
// فبنعكس ترتيب الـ x يدوياً هنا عشان يطابق اتجاه القراءة العربي).
function renderProgressChart(history) {
  const card = document.getElementById('progress-chart-card');
  const host = document.getElementById('progress-chart-svg');
  const trendEl = document.getElementById('progress-trend');
  const valid = (history || []).filter(h => h.loh != null || h.madi != null);

  if (valid.length < 2) { card.style.display = 'none'; return; }
  card.style.display = 'block';

  const W = 340, H = 170, padL = 30, padR = 8, padT = 12, padB = 24;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const n = valid.length;

  const xAt = i => padL + (n === 1 ? innerW / 2 : (n - 1 - i) / (n - 1) * innerW);
  const yAt = score => padT + (100 - score) / 100 * innerH;

  function buildPts(key) {
    const pts = [];
    valid.forEach((h, i) => { if (h[key] != null) pts.push([xAt(i), yAt(h[key])]); });
    return pts;
  }
  const lohPts = buildPts('loh'), madiPts = buildPts('madi');

  function polylineStr(pts) { return pts.map(p => p.join(',')).join(' '); }
  function areaPath(pts) {
    if (pts.length < 2) return '';
    const base = padT + innerH;
    return `M${pts[0][0]},${base} L${pts.map(p => p.join(',')).join(' L')} L${pts[pts.length - 1][0]},${base} Z`;
  }

  const gridLines = [0, 25, 50, 75, 100].map(v => {
    const y = yAt(v);
    return `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="var(--border)" stroke-width="1"/>` +
      `<text x="${padL - 5}" y="${y + 3}" font-size="9" fill="var(--text-hint)" text-anchor="end">${v}</text>`;
  }).join('');

  const fmtDate = d => d ? new Date(d).toLocaleDateString('ar-EG', { day: 'numeric', month: 'numeric' }) : '';
  const firstDate = fmtDate(valid[0].date), lastDate = fmtDate(valid[n - 1].date);

  host.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="lohGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--green)" stop-opacity="0.22"/>
          <stop offset="100%" stop-color="var(--green)" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="madiGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--gold)" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="var(--gold)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${gridLines}
      ${madiPts.length > 1 ? `<path d="${areaPath(madiPts)}" fill="url(#madiGrad)"/>` : ''}
      ${lohPts.length > 1 ? `<path d="${areaPath(lohPts)}" fill="url(#lohGrad)"/>` : ''}
      ${madiPts.length > 1 ? `<polyline points="${polylineStr(madiPts)}" fill="none" stroke="var(--gold)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>` : ''}
      ${lohPts.length > 1 ? `<polyline points="${polylineStr(lohPts)}" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>` : ''}
      ${madiPts.map(p => `<circle cx="${p[0]}" cy="${p[1]}" r="2.6" fill="var(--gold)"/>`).join('')}
      ${lohPts.map(p => `<circle cx="${p[0]}" cy="${p[1]}" r="2.6" fill="var(--green)"/>`).join('')}
      <text x="${W - padR}" y="${H - 4}" font-size="10" fill="var(--text-hint)" text-anchor="end">${firstDate}</text>
      <text x="${padL}" y="${H - 4}" font-size="10" fill="var(--text-hint)" text-anchor="start">${lastDate}</text>
    </svg>`;

  // اتجاه عام: بنقارن متوسط اللوح في النص الأول من الفترة بالنص التاني —
  // نفس فكرة "الأكثر تحسناً" في التطبيق الرئيسي، لكن كنص مباشر هنا بدل وسام.
  const lohScores = valid.map(h => h.loh).filter(v => v != null);
  if (lohScores.length >= 4) {
    const mid = Math.floor(lohScores.length / 2);
    const olderAvg = lohScores.slice(0, mid).reduce((a, b) => a + b, 0) / mid;
    const newerAvg = lohScores.slice(mid).reduce((a, b) => a + b, 0) / (lohScores.length - mid);
    const diff = newerAvg - olderAvg;
    if (diff >= 5) { trendEl.textContent = '📈 في تحسّن مستمر'; trendEl.style.color = 'var(--green)'; }
    else if (diff <= -5) { trendEl.textContent = '📉 محتاج تشجيع ومتابعة أكتر'; trendEl.style.color = 'var(--red)'; }
    else { trendEl.textContent = '➡️ مستقر'; trendEl.style.color = 'var(--text-muted)'; }
  } else {
    trendEl.textContent = '';
  }
}

function scoreName(score) {
  const s = parseInt(score);
  if (isNaN(s)) return '';
  if (s >= 85) return 'ممتاز';
  if (s >= 75) return 'جيد جداً';
  if (s >= 65) return 'جيد';
  if (s >= 50) return 'مقبول';
  return 'إعادة';
}

// Firebase ref paths can't contain . # $ [ ] / — a malformed/tampered token
// in the URL must never be able to throw inside db.ref() and crash the page.
function fbKey(id) { return String(id).replace(/[.#$\[\]\/]/g, '_'); }

function getToken() {
  return fbKey((new URLSearchParams(location.search).get('t') || '').trim());
}

function showStatus(icon, msg) {
  document.getElementById('content').style.display = 'none';
  const el = document.getElementById('status-msg');
  el.style.display = 'block';
  el.innerHTML = '<div class="big">' + icon + '</div>' + esc(msg);
}

let currentPublicData = null;

function renderStatGrid(stats) {
  document.getElementById('stat-grid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${stats.attendPct ?? 0}%</div><div class="stat-lbl">نسبة الحضور</div></div>
    <div class="stat-card"><div class="stat-num">${stats.sessionsCount ?? 0}</div><div class="stat-lbl">جلسة مسجلة</div></div>
    <div class="stat-card"><div class="stat-num">${(stats.totalAyat || 0).toLocaleString()}</div><div class="stat-lbl">آية مسمّعة</div></div>
    <div class="stat-card"><div class="stat-num">${stats.avgLoh != null ? stats.avgLoh + '%' : '—'}</div><div class="stat-lbl">متوسط اللوح</div></div>`;
}

// الفلتر بيأثر بس على بطاقات الملخص فوق — الرسم البياني والأوسمة وقايمة
// آخر الجلسات عمداً برّاه، وتفضل شاملة كل الوقت دايماً (قرار مقصود، مش نسيان).
function onMonthFilterChange() {
  if (!currentPublicData) return;
  const month = document.getElementById('month-filter').value;
  if (month === 'all') {
    renderStatGrid(currentPublicData);
  } else {
    const m = (currentPublicData.monthlyStats || {})[month];
    renderStatGrid(m || { attendPct: 0, sessionsCount: 0, totalAyat: 0, avgLoh: null });
  }
}

function populateMonthFilterOptions(monthlyStats) {
  const sel = document.getElementById('month-filter');
  const months = Object.keys(monthlyStats || {}).sort().reverse();
  if (!months.length) { sel.style.display = 'none'; return; }
  const MONTH_NAMES = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  sel.innerHTML = '<option value="all">📅 كل الفترة</option>' + months.map(m => {
    const [y, mo] = m.split('-');
    return `<option value="${m}">${MONTH_NAMES[parseInt(mo, 10) - 1]} ${y}</option>`;
  }).join('');
  sel.style.display = 'block';
  sel.value = 'all';
}

function render(data) {
  document.getElementById('status-msg').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  currentPublicData = data;

  document.getElementById('child-name').textContent = data.name || 'الطالب';
  const badgeEl = document.getElementById('child-badge');
  badgeEl.innerHTML = (data.rank && data.attendPct >= 70)
    ? '<span class="badge-star">🌟 المركز ' + Number(data.rank) + ' في الحضور</span>'
    : '';

  populateMonthFilterOptions(data.monthlyStats);
  renderStatGrid(data);

  const badges = data.badges || [];
  const badgesCard = document.getElementById('badges-card');
  if (badges.length) {
    badgesCard.style.display = 'block';
    document.getElementById('badges-list').innerHTML = badges.map(b =>
      `<span class="badge-pill">${esc(b.icon)} ${esc(b.label)}</span>`
    ).join('');
  } else {
    badgesCard.style.display = 'none';
  }

  renderProgressChart(data.scoreHistory || []);

  const task = data.currentTask;
  const taskCard = document.getElementById('task-card');
  const hasTask = task && ((task.newLoh && task.newLoh.length) || (task.newMadi && task.newMadi.length));
  if (hasTask) {
    taskCard.style.display = 'block';
    let body = '';
    if (task.newLoh && task.newLoh.length) body += `<div class="task-line"><span>📝</span><span><b>اللوح:</b> ${joinSuraNames(task.newLoh)}</span></div>`;
    if (task.newMadi && task.newMadi.length) body += `<div class="task-line"><span>🔄</span><span><b>الماضي:</b> ${joinSuraNames(task.newMadi)}</span></div>`;
    document.getElementById('task-body').innerHTML = body;
  } else {
    taskCard.style.display = 'none';
  }

  const list = data.recentSessions || [];
  const el = document.getElementById('sessions-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state">لا يوجد جلسات مسجلة بعد</div>';
  } else {
    el.innerHTML = list.map(r => {
      const dateStr = r.date ? new Date(r.date + 'T00:00:00').toLocaleDateString('ar-EG', { weekday:'long', day:'numeric', month:'long' }) : '';
      let lines = '';
      if (r.newLoh && r.newLoh.length) lines += `<div class="session-line">📝 لوح جديد: ${joinSuraNames(r.newLoh)}</div>`;
      if (r.loh) {
        lines += `<div class="session-line">⭐ تقييم اللوح: ${r.loh.score}/100 ${renderStarsHTML(r.loh.score)} ${scoreName(r.loh.score)}</div>`;
        if (r.loh.mistakes) lines += `<div class="session-line" style="font-size:12px;color:var(--text-hint)">↳ ${r.loh.mistakes.full||0} خطأ، ${r.loh.mistakes.tajweed||0} خطأ تجويدي</div>`;
      }
      if (r.newMadi && r.newMadi.length) lines += `<div class="session-line">🔄 ماضي جديد: ${joinSuraNames(r.newMadi)}</div>`;
      if (r.madi) {
        lines += `<div class="session-line">⭐ تقييم الماضي: ${r.madi.score}/100 ${renderStarsHTML(r.madi.score)} ${scoreName(r.madi.score)}</div>`;
        if (r.madi.mistakes) lines += `<div class="session-line" style="font-size:12px;color:var(--text-hint)">↳ ${r.madi.mistakes.full||0} خطأ، ${r.madi.mistakes.tajweed||0} خطأ تجويدي</div>`;
      }
      if (r.tajweed) lines += `<div class="session-line">📐 تجويد: ${esc(r.tajweed.sura)}${ayahRange(esc(r.tajweed.from), esc(r.tajweed.to))}</div>`;
      if (r.note) lines += `<div class="session-line" style="font-style:italic">💬 ${esc(r.note)}</div>`;
      return `<div class="session-item"><div class="session-date">${dateStr}</div>${lines}</div>`;
    }).join('');
  }

  if (data.updatedAt) {
    document.getElementById('updated-hint').textContent = 'آخر تحديث: ' + new Date(data.updatedAt).toLocaleString('ar-EG', { dateStyle:'medium', timeStyle:'short' });
  }
}

const token = getToken();
if (!token) {
  showStatus('⚠️', 'الرابط غير صحيح أو ناقص. تواصلوا مع المحفظ للحصول على رابط المتابعة الخاص بابنكم/ابنتكم.');
} else {
  db.ref('publicStats/' + token).on('value', snap => {
    const data = snap.val();
    if (!data) { showStatus('🔍', 'لا توجد بيانات لهذا الرابط بعد. تواصلوا مع المحفظ للتأكد من الرابط.'); return; }
    render(data);
  }, () => {
    showStatus('📡', 'تعذر الاتصال بالخادم. تأكدوا من الإنترنت وأعيدوا تحميل الصفحة.');
  });
}
</script>
</body>
</html>
