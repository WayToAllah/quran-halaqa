<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#15613a">
<meta name="robots" content="noindex, nofollow">
<title>صفحة المتابعة — متابعة حفظ القرآن</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  :root {
    --green:#15613a; --green-deep:#0f4a2c; --green-light:#e7f3ec; --green-tint:#f1f8f4;
    --gold:#b8881e; --gold-soft:#d4a82c; --gold-light:#fbf4e0;
    --text:#16201b; --text-muted:#5e6b63; --text-hint:#9aa6a0;
    --bg:#f4f6f3; --surface:#ffffff;
    --border:rgba(20,40,28,0.08); --border-strong:rgba(20,40,28,0.16);
    --radius:16px; --radius-sm:10px; --red:#c0392b;
    --shadow-sm:0 1px 2px rgba(20,40,28,0.04), 0 1px 3px rgba(20,40,28,0.06);
    --shadow-md:0 2px 8px rgba(20,40,28,0.06), 0 4px 16px rgba(20,40,28,0.05);
  }
  body { font-family:-apple-system,'Segoe UI',Tahoma,Arial,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:40px; -webkit-font-smoothing:antialiased; }
  .header { background:linear-gradient(135deg,var(--green-deep),var(--green)); color:white; padding:26px 20px 22px; text-align:center; position:relative; }
  .header::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold-soft),transparent); opacity:0.7; }
  .header-icon { font-size:28px; margin-bottom:8px; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.2)); }
  .header h1 { font-size:19px; font-weight:700; letter-spacing:-0.01em; }
  .header-sub { margin-top:8px; }
  .badge-star { display:inline-block; background:rgba(255,255,255,0.18); color:#fff; font-size:12px; font-weight:600; padding:4px 12px; border-radius:20px; }
  .wrap { padding:16px; max-width:480px; margin:0 auto; }
  .card { background:var(--surface); border-radius:var(--radius); border:1px solid var(--border); padding:18px; margin-bottom:13px; box-shadow:var(--shadow-sm); }
  .card-title { font-size:11px; font-weight:700; color:var(--green); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:14px; display:flex; align-items:center; gap:7px; }
  .card-title .dot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 0 3px var(--green-light); }
  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:13px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 14px; text-align:center; box-shadow:var(--shadow-sm); }
  .stat-num { font-size:26px; font-weight:800; color:var(--green); letter-spacing:-0.02em; }
  .stat-lbl { font-size:12px; color:var(--text-muted); margin-top:4px; font-weight:500; }
  .task-line { font-size:14px; margin-bottom:8px; display:flex; align-items:flex-start; gap:8px; }
  .task-line:last-child { margin-bottom:0; }
  .session-item { padding:13px 0; border-bottom:1px solid var(--border); }
  .session-item:last-child { border-bottom:none; padding-bottom:0; }
  .session-date { font-size:12px; color:var(--text-hint); font-weight:600; margin-bottom:5px; }
  .session-line { font-size:13.5px; color:var(--text-muted); margin-top:4px; line-height:1.6; }
  .stars { letter-spacing:1px; color:var(--gold-soft); }
  .empty-state { text-align:center; color:var(--text-hint); font-size:14px; padding:1.5rem 1rem; }
  .status-msg { text-align:center; padding:60px 20px; color:var(--text-muted); font-size:14.5px; line-height:1.8; }
  .status-msg .big { font-size:38px; margin-bottom:12px; }
  .hint { font-size:11.5px; color:var(--text-hint); text-align:center; margin-top:6px; line-height:1.7; }
  .badges-list { display:flex; flex-wrap:wrap; gap:8px; }
  .badge-pill { display:inline-flex; align-items:center; gap:5px; background:var(--gold-light); color:var(--gold); border:1px solid rgba(184,136,30,0.25); font-size:12.5px; font-weight:600; padding:7px 12px; border-radius:20px; }
  @media (prefers-color-scheme:dark) {
    :root { --text:#eef2ef; --text-muted:#9fb0a6; --text-hint:#6a7872; --bg:#10140f; --surface:#1a1f1b; --border:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.16); --green-light:#15301f; }
  }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="header">
  <div class="header-icon">📖</div>
  <h1 id="child-name">جاري التحميل...</h1>
  <div class="header-sub" id="child-badge"></div>
</div>

<div class="wrap">
  <div id="content" style="display:none">
    <div class="stat-grid" id="stat-grid"></div>

    <div class="card" id="badges-card" style="display:none">
      <div class="card-title"><div class="dot"></div> 🏅 الأوسمة</div>
      <div class="badges-list" id="badges-list"></div>
    </div>

    <div class="card" id="task-card" style="display:none">
      <div class="card-title"><div class="dot"></div> 📝 المهمة الحالية</div>
      <div id="task-body"></div>
    </div>

    <div class="card">
      <div class="card-title"><div class="dot"></div> آخر الجلسات</div>
      <div id="sessions-list"></div>
    </div>

    <div class="hint" id="updated-hint"></div>
  </div>

  <div class="status-msg" id="status-msg">
    <div class="big">⏳</div>
    جاري تحميل بيانات الطالب...
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCLzsd-tyAPKoS6HQ-Kw6LEwaxPSibbKSg",
  authDomain: "quran-app-abe52.firebaseapp.com",
  databaseURL: "https://quran-app-abe52-default-rtdb.firebaseio.com",
  projectId: "quran-app-abe52",
  storageBucket: "quran-app-abe52.firebasestorage.app",
  messagingSenderId: "484959710944",
  appId: "1:484959710944:web:454059b1f2136c0d73aa85"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Escape any value before injecting it into innerHTML — session notes and
// tajweed ayah numbers are the only fields here that could ever originate
// from free-text admin input.
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function ayahRange(from, to) { return (from && to) ? ' (' + from + '–' + to + ')' : from ? ' (من ' + from + ')' : ''; }

function joinSuraNames(list) {
  const parts = list.map(m => esc(m.sura) + ayahRange(esc(m.from), esc(m.to)));
  if (!parts.length) return '';
  if (parts.length === 1) return parts[0];
  return parts.slice(0, -1).join('، ') + ' و' + parts[parts.length - 1];
}

function scoreToHalfStars(score) {
  const s = Math.min(100, Math.max(0, parseInt(score) || 0));
  return Math.round(s / 10) * 0.5;
}

function renderStarsHTML(score) {
  const half = scoreToHalfStars(score);
  const fillPct = (half / 5) * 100;
  return '<span class="stars" style="position:relative;display:inline-block;font-size:14px;line-height:1;vertical-align:middle;direction:ltr">' +
    '<span style="color:#dcdcdc">★★★★★</span>' +
    '<span style="position:absolute;top:0;left:0;width:' + fillPct + '%;overflow:hidden;white-space:nowrap;color:#e8a700">★★★★★</span>' +
    '</span>';
}

function scoreName(score) {
  const s = parseInt(score);
  if (isNaN(s) || s === 0) return '';
  if (s >= 85) return 'ممتاز';
  if (s >= 75) return 'جيد جداً';
  if (s >= 65) return 'جيد';
  if (s >= 50) return 'مقبول';
  return 'إعادة';
}

// Firebase ref paths can't contain . # $ [ ] / — a malformed/tampered token
// in the URL must never be able to throw inside db.ref() and crash the page.
function fbKey(id) { return String(id).replace(/[.#$\[\]\/]/g, '_'); }

function getToken() {
  return fbKey((new URLSearchParams(location.search).get('t') || '').trim());
}

function showStatus(icon, msg) {
  document.getElementById('content').style.display = 'none';
  const el = document.getElementById('status-msg');
  el.style.display = 'block';
  el.innerHTML = '<div class="big">' + icon + '</div>' + esc(msg);
}

function render(data) {
  document.getElementById('status-msg').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  document.getElementById('child-name').textContent = data.name || 'الطالب';
  const badgeEl = document.getElementById('child-badge');
  badgeEl.innerHTML = (data.rank && data.attendPct >= 70)
    ? '<span class="badge-star">🌟 المركز ' + Number(data.rank) + ' في الحضور</span>'
    : '';

  document.getElementById('stat-grid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${data.attendPct ?? 0}%</div><div class="stat-lbl">نسبة الحضور</div></div>
    <div class="stat-card"><div class="stat-num">${data.sessionsCount ?? 0}</div><div class="stat-lbl">جلسة مسجلة</div></div>
    <div class="stat-card"><div class="stat-num">${(data.totalAyat || 0).toLocaleString()}</div><div class="stat-lbl">آية مسمّعة</div></div>
    <div class="stat-card"><div class="stat-num">${data.avgLoh != null ? data.avgLoh + '%' : '—'}</div><div class="stat-lbl">متوسط اللوح</div></div>`;

  const badges = data.badges || [];
  const badgesCard = document.getElementById('badges-card');
  if (badges.length) {
    badgesCard.style.display = 'block';
    document.getElementById('badges-list').innerHTML = badges.map(b =>
      `<span class="badge-pill">${esc(b.icon)} ${esc(b.label)}</span>`
    ).join('');
  } else {
    badgesCard.style.display = 'none';
  }

  const task = data.currentTask;
  const taskCard = document.getElementById('task-card');
  const hasTask = task && ((task.newLoh && task.newLoh.length) || (task.newMadi && task.newMadi.length));
  if (hasTask) {
    taskCard.style.display = 'block';
    let body = '';
    if (task.newLoh && task.newLoh.length) body += `<div class="task-line"><span>📝</span><span><b>اللوح:</b> ${joinSuraNames(task.newLoh)}</span></div>`;
    if (task.newMadi && task.newMadi.length) body += `<div class="task-line"><span>🔄</span><span><b>الماضي:</b> ${joinSuraNames(task.newMadi)}</span></div>`;
    document.getElementById('task-body').innerHTML = body;
  } else {
    taskCard.style.display = 'none';
  }

  const list = data.recentSessions || [];
  const el = document.getElementById('sessions-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state">لا يوجد جلسات مسجلة بعد</div>';
  } else {
    el.innerHTML = list.map(r => {
      const dateStr = r.date ? new Date(r.date + 'T00:00:00').toLocaleDateString('ar-EG', { weekday:'long', day:'numeric', month:'long' }) : '';
      let lines = '';
      if (r.newLoh && r.newLoh.length) lines += `<div class="session-line">📝 لوح جديد: ${joinSuraNames(r.newLoh)}</div>`;
      if (r.loh) lines += `<div class="session-line">⭐ تقييم اللوح: ${r.loh.score}/100 ${renderStarsHTML(r.loh.score)} ${scoreName(r.loh.score)}</div>`;
      if (r.newMadi && r.newMadi.length) lines += `<div class="session-line">🔄 ماضي جديد: ${joinSuraNames(r.newMadi)}</div>`;
      if (r.madi) lines += `<div class="session-line">⭐ تقييم الماضي: ${r.madi.score}/100 ${renderStarsHTML(r.madi.score)} ${scoreName(r.madi.score)}</div>`;
      if (r.tajweed) lines += `<div class="session-line">📐 تجويد: ${esc(r.tajweed.sura)}${ayahRange(esc(r.tajweed.from), esc(r.tajweed.to))}</div>`;
      if (r.note) lines += `<div class="session-line" style="font-style:italic">💬 ${esc(r.note)}</div>`;
      return `<div class="session-item"><div class="session-date">${dateStr}</div>${lines}</div>`;
    }).join('');
  }

  if (data.updatedAt) {
    document.getElementById('updated-hint').textContent = 'آخر تحديث: ' + new Date(data.updatedAt).toLocaleString('ar-EG', { dateStyle:'medium', timeStyle:'short' });
  }
}

const token = getToken();
if (!token) {
  showStatus('⚠️', 'الرابط غير صحيح أو ناقص. تواصلوا مع المحفظ للحصول على رابط المتابعة الخاص بابنكم/ابنتكم.');
} else {
  db.ref('publicStats/' + token).on('value', snap => {
    const data = snap.val();
    if (!data) { showStatus('🔍', 'لا توجد بيانات لهذا الرابط بعد. تواصلوا مع المحفظ للتأكد من الرابط.'); return; }
    render(data);
  }, () => {
    showStatus('📡', 'تعذر الاتصال بالخادم. تأكدوا من الإنترنت وأعيدوا تحميل الصفحة.');
  });
}
</script>
</body>
</html>
