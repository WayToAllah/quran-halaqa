name: CI

on:
  push:
    branches: [rebuild-v2, main]
  pull_request:
    branches: [rebuild-v2, main]

jobs:
  domain:
    name: Typecheck + domain tests + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  firestore-rules:
    name: Firestore security rules tests (emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
   java-version: '21' # firebase-tools requires Java 21+ (bumped from 17 after CI run failed with "no longer supports Java version before 21")
      - run: npm ci
      # This is the job that could NOT run in the sandboxed environment these
      # rules were authored in (storage.googleapis.com, where the emulator
      # binary is hosted, was outside that sandbox's allowed domains). GitHub
      # Actions runners have normal internet access, so it runs for real here.
      - run: npm run test:rules
