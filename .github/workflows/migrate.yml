name: Migrate RTDB to Firestore

# ⚠️ MANUAL, DATA-WRITE WORKFLOW — only runs when you explicitly trigger it
# from the Actions tab. Never runs automatically on push.
#
# ---------------------------------------------------------------------------
# ONE-TIME SETUP (before the first run):
#
# 1. Enable Firestore: Firebase Console → Firestore Database → Create database
#    (Native mode, any region — e.g. eur3 / europe-west).
#
# 2. Get a service account key: Firebase Console → Project Settings (gear
#    icon) → Service Accounts tab → "Generate new private key" → a JSON
#    file downloads.
#
# 3. Add it as a GitHub secret: this repo → Settings → Secrets and
#    variables → Actions → "New repository secret" →
#      Name:  FIREBASE_SERVICE_ACCOUNT
#      Value: paste the ENTIRE content of the downloaded JSON file
#    → Save. (This is a one-time setup — never needed again after this.)
#
# 4. Find your admin UID: Firebase Console → Authentication → Users →
#    copy the value in the "User UID" column for your admin account.
#
# ---------------------------------------------------------------------------
# TO RUN:
#
# Actions tab (top of the repo) → "Migrate RTDB to Firestore" (left sidebar)
# → "Run workflow" button → fill in:
#   - admin_uid: the UID from step 4
#   - dry_run: "true" for the first run (prints what WOULD happen, writes
#     nothing — safe to run as many times as you like) → "false" once the
#     dry-run output looks correct, to actually migrate
#   - deploy_rules: "true" to also publish firestore.rules/indexes (safe —
#     rules deploys don't touch any data)
# → "Run workflow"
#
# Then click into the run to watch its log — the "Run migration" step
# prints exactly what it found/wrote, and a final verification comparing
# written counts to source counts.
# ---------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      admin_uid:
        description: 'Your Firebase Auth UID (Console → Authentication → Users)'
        required: true
      dry_run:
        description: 'Dry run (no writes)? true or false'
        required: true
        default: 'true'
      deploy_rules:
        description: 'Also deploy firestore.rules/indexes? true or false'
        required: true
        default: 'true'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Write service account credentials
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: printf '%s' "$SERVICE_ACCOUNT_JSON" > /tmp/service-account.json

      - name: Deploy Firestore rules + indexes
        if: ${{ github.event.inputs.deploy_rules == 'true' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service-account.json
        run: npx firebase deploy --only firestore:rules,firestore:indexes --project quran-app-abe52 --non-interactive

      - name: Run migration
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service-account.json
          ADMIN_UID: ${{ github.event.inputs.admin_uid }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            npx tsx scripts/migrate-rtdb-to-firestore.ts --admin-uid "$ADMIN_UID" --dry-run
          else
            npx tsx scripts/migrate-rtdb-to-firestore.ts --admin-uid "$ADMIN_UID"
          fi

      - name: Clean up credentials file
        if: always()
        run: rm -f /tmp/service-account.json
