name: Migrate RTDB to Firestore

on:
  workflow_dispatch:
    inputs:
      admin_uid:
        description: 'Your Firebase Auth UID (Console → Authentication → Users)'
        required: true
      dry_run:
        description: 'Dry run (no writes)? true or false'
        required: true
        default: 'true'
      prune:
        description: 'Delete Firestore records NOT in RTDB (cleanup)? true or false'
        required: true
        default: 'false'
      deploy_rules:
        description: 'Also deploy firestore.rules/indexes? true or false'
        required: true
        default: 'false'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Write service account credentials
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: printf '%s' "$SERVICE_ACCOUNT_JSON" > /tmp/service-account.json

      - name: Deploy Firestore rules + indexes
        if: ${{ github.event.inputs.deploy_rules == 'true' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service-account.json
        run: npx firebase deploy --only firestore:rules,firestore:indexes --project quran-app-abe52 --non-interactive

      - name: Run migration
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service-account.json
          ADMIN_UID: ${{ github.event.inputs.admin_uid }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          PRUNE: ${{ github.event.inputs.prune }}
        run: |
          ARGS="--admin-uid $ADMIN_UID"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "$PRUNE" = "true" ]; then
            ARGS="$ARGS --prune --confirm"
          fi
          echo "Running: tsx scripts/migrate-rtdb-to-firestore.ts $ARGS"
          npx tsx scripts/migrate-rtdb-to-firestore.ts $ARGS

      - name: Clean up credentials file
        if: always()
        run: rm -f /tmp/service-account.json
